<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bram vs Steffan</title>
    <style>
      :root {
        --bg-1: #0f1117;
        --bg-2: #1d2330;
        --panel: rgba(12, 14, 20, 0.75);
        --ink: #f8f5ef;
        --muted: #b8b6b0;
        --danger: #f15152;
        --glow: #ffa552;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Bebas Neue", "Impact", "Arial Narrow", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 20%, rgba(241, 81, 82, 0.22), transparent 38%),
          radial-gradient(circle at 80% 75%, rgba(255, 165, 82, 0.15), transparent 45%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
        padding: 24px;
        overflow-x: hidden;
      }

      .poster {
        width: min(920px, 100%);
        padding: clamp(20px, 4vw, 48px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: var(--panel);
        backdrop-filter: blur(4px);
        border-radius: 20px;
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.45);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .tag {
        letter-spacing: 0.16em;
        font-size: clamp(14px, 2vw, 20px);
        color: var(--muted);
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        line-height: 0.95;
        text-transform: uppercase;
        font-size: clamp(44px, 10vw, 114px);
        letter-spacing: 0.02em;
      }

      h1 strong {
        color: var(--danger);
        text-shadow: 0 0 18px rgba(241, 81, 82, 0.45);
      }

      .vs {
        margin: 18px 0;
        font-size: clamp(24px, 4vw, 42px);
        letter-spacing: 0.18em;
        color: var(--glow);
      }

      .warning {
        margin: 16px auto 0;
        max-width: 22ch;
        font-size: clamp(30px, 6vw, 66px);
        line-height: 1;
        text-transform: uppercase;
      }

      .warning span {
        color: var(--danger);
      }

      .foot {
        margin-top: 26px;
        font-family: "Space Mono", "Courier New", monospace;
        font-size: clamp(13px, 1.7vw, 16px);
        color: var(--muted);
        letter-spacing: 0.03em;
      }

      .bram-zone {
        margin: 24px auto 8px;
        width: min(380px, 92%);
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .bram {
        width: 190px;
        height: 220px;
        position: relative;
        transform-origin: center 65%;
        animation: hover 2.8s ease-in-out infinite;
        cursor: pointer;
      }

      .head {
        width: 170px;
        height: 170px;
        margin: 0 auto;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 28%, #f5d8b5 0%, #cb9d73 54%, #7b4e2d 100%);
        box-shadow:
          0 0 30px rgba(255, 165, 82, 0.18),
          inset 0 -12px 30px rgba(0, 0, 0, 0.35);
        position: relative;
        border: 2px solid rgba(255, 235, 200, 0.25);
      }

      .head::before {
        content: "";
        position: absolute;
        top: 8px;
        left: 44px;
        width: 82px;
        height: 28px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.22);
        filter: blur(1px);
      }

      .eye {
        position: absolute;
        top: 68px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #100304;
        box-shadow:
          0 0 12px rgba(241, 81, 82, 0.65),
          0 0 32px rgba(241, 81, 82, 0.4);
        animation: eyePulse 1.6s ease-in-out infinite;
      }

      .eye.left {
        left: 46px;
      }

      .eye.right {
        right: 46px;
      }

      .eye::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 50%;
        background: #ff5858;
      }

      .mouth {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 38px;
        width: 72px;
        height: 24px;
        border-bottom: 6px solid #32070a;
        border-radius: 0 0 56px 56px;
      }

      .neck {
        width: 40px;
        height: 24px;
        margin: -6px auto 0;
        background: #9a6844;
        border-radius: 0 0 12px 12px;
      }

      .label {
        font-family: "Space Mono", "Courier New", monospace;
        font-size: 14px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
        padding: 10px 14px;
        border-radius: 999px;
        font-family: "Space Mono", "Courier New", monospace;
        font-size: 13px;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease;
      }

      button:hover {
        background: rgba(241, 81, 82, 0.22);
        transform: translateY(-1px);
      }

      .scare-flash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle, rgba(241, 81, 82, 0.35), rgba(0, 0, 0, 0.9));
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .active-flash {
        opacity: 1;
      }

      .shake {
        animation: quake 360ms linear 1;
      }

      .rage {
        transform: scale(1.15);
        filter: drop-shadow(0 0 18px rgba(241, 81, 82, 0.66));
      }

      @keyframes hover {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes eyePulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.22);
          opacity: 1;
        }
      }

      @keyframes quake {
        0% { transform: translateX(0); }
        20% { transform: translateX(-8px); }
        40% { transform: translateX(8px); }
        60% { transform: translateX(-7px); }
        80% { transform: translateX(7px); }
        100% { transform: translateX(0); }
      }

      @media (max-width: 520px) {
        .poster {
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="poster">
      <p class="tag">Official Scare Ranking</p>
      <h1><strong>Bram</strong> is scarier than Steffan</h1>
      <p class="vs">No contest.</p>
      <p class="warning">Sort the <span>VAT issues</span> or Bram will find you.</p>
      <section class="bram-zone">
        <div class="bram" id="bram">
          <div class="head">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
          <div class="neck"></div>
        </div>
        <p class="label" id="status">Bram is watching...</p>
        <div class="controls">
          <button type="button" id="poke">Poke Bram</button>
          <button type="button" id="sortVat">Sort VAT Issues</button>
        </div>
      </section>
      <p class="foot">Handle the paperwork. Avoid the consequences.</p>
    </main>
    <div class="scare-flash" id="flash"></div>
    <script>
      const bram = document.getElementById("bram");
      const statusText = document.getElementById("status");
      const pokeBtn = document.getElementById("poke");
      const sortBtn = document.getElementById("sortVat");
      const flash = document.getElementById("flash");

      function scare(message) {
        statusText.textContent = message;
        bram.classList.add("shake", "rage");
        flash.classList.add("active-flash");
        setTimeout(() => {
          bram.classList.remove("shake", "rage");
          flash.classList.remove("active-flash");
        }, 400);
      }

      pokeBtn.addEventListener("click", () => {
        scare("Bad move. Bram is approaching.");
      });

      bram.addEventListener("click", () => {
        scare("You touched the bald Bram. He knows your location.");
      });

      sortBtn.addEventListener("click", () => {
        statusText.textContent = "VAT issues sorted. Bram calms down... for now.";
      });
    </script>
  </body>
</html>
